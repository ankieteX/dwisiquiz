<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MEM QUIZ PRO 🔥</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:#fff;text-align:center}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#1c1c1c;padding:15px;border-radius:12px;margin-top:10px}
button{padding:12px;margin:6px;width:100%;border:0;border-radius:10px;font-size:15px;cursor:pointer}
input,textarea,select{width:100%;padding:10px;margin:5px;border-radius:8px;border:none}
.hidden{display:none}
.a{background:#2ecc71}
.b{background:#f1c40f}
.c{background:#e74c3c}
.timer{font-size:22px;margin:10px}
.small{font-size:12px;opacity:.7}
</style>
</head>
<body>
<div class="container">
<h1>🔥 MEM QUIZ PRO MULTIPLAYER</h1>

<!-- LOGIN -->
<div id="login" class="card">
  <h3>Wejście</h3>
  <input id="nick" placeholder="Nick"/>
  <input id="room" placeholder="Kod pokoju"/>
  <button onclick="createRoom()">Stwórz pokój (HOST)</button>
  <button onclick="joinRoom()">Dołącz</button>
</div>

<!-- LOBBY -->
<div id="lobby" class="card hidden">
  <h3>Lobby</h3>
  <div id="players"></div>
  <button onclick="startGame()" id="startBtn" class="hidden">START</button>
</div>

<!-- GAME -->
<div id="game" class="card hidden">
  <h2 id="q"></h2>
  <button class="a" onclick="answer('A')" id="a"></button>
  <button class="b" onclick="answer('B')" id="b"></button>
  <button class="c" onclick="answer('C')" id="c"></button>
  <div class="timer" id="timer"></div>
</div>

<!-- BUILDER -->
<div id="builder" class="card hidden">
  <h3>Tworzenie quizu</h3>
  <input id="quizTitle" placeholder="Tytuł quizu"/>
  <textarea id="quizData" placeholder='[{"q":"pytanie","a":"A","b":"B","c":"C"}]'></textarea>
  <button onclick="saveQuiz()">Zapisz quiz</button>
</div>

<!-- QUIZ SELECT -->
<div id="selectQuiz" class="card hidden">
  <h3>Wybierz quiz</h3>
  <select id="quizList"></select>
  <button onclick="chooseQuiz()">Użyj</button>
</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCjIKb55h0taiyQNAHmP2JX9QQ-mfL8FAQ",
  authDomain: "kahoot-1e809.firebaseapp.com",
  databaseURL: "https://kahoot-1e809-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "kahoot-1e809",
  storageBucket: "kahoot-1e809.firebasestorage.app",
  messagingSenderId: "24344892847",
  appId: "1:24344892847:web:cce7d556f1319c6c074b5a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let room="";
let nick="";
let isHost=false;
let currentQuiz=null;
let currentIndex=0;
let timerInterval;
let startAt=0;

// ROOM
function createRoom(){
  room=Math.floor(Math.random()*9000+1000)+"";
  nick=document.getElementById('nick').value||"HOST";
  isHost=true;

  db.ref('rooms/'+room).set({players:{},quizId:null,qIndex:0,phase:'lobby'});

  document.getElementById('login').classList.add('hidden');
  document.getElementById('selectQuiz').classList.remove('hidden');
  loadQuizzes();
}

function joinRoom(){
  room=document.getElementById('room').value;
  nick=document.getElementById('nick').value;

  db.ref('rooms/'+room+'/players/'+nick).set({score:0});

  document.getElementById('login').classList.add('hidden');
  document.getElementById('lobby').classList.remove('hidden');

  listen();
}

function listen(){
  db.ref('rooms/'+room).on('value',snap=>{
    const d=snap.val(); if(!d) return;

    const p=d.players||{};
    document.getElementById('players').innerText=Object.keys(p).join(', ');

    if(isHost) document.getElementById('startBtn').classList.remove('hidden');

    if(d.phase==='question') showQuestion(d);
  });
}

// QUIZES
function loadQuizzes(){
  db.ref('quizzes').once('value',snap=>{
    const list=snap.val()||{};
    const sel=document.getElementById('quizList');
    sel.innerHTML="";
    Object.keys(list).forEach(k=>{
      let o=document.createElement('option');
      o.value=k;
      o.innerText=list[k].title;
      sel.appendChild(o);
    });
  });
}

function chooseQuiz(){
  const id=document.getElementById('quizList').value;
  db.ref('quizzes/'+id).once('value',snap=>{
    db.ref('rooms/'+room).update({quizId:id,phase:'lobby',qIndex:0});
  });
  document.getElementById('selectQuiz').classList.add('hidden');
  document.getElementById('lobby').classList.remove('hidden');
}

// START
function startGame(){
  startAt=Date.now()+3000;
  db.ref('rooms/'+room).update({phase:'question',qIndex:0,startAt:startAt});
  runTimer();
}

function runTimer(){
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    const now=Date.now();
    const left=Math.max(0,10-Math.floor((now-startAt)/1000));
    document.getElementById('timer').innerText="⏳ "+left;

    if(left<=0){
      nextQuestion();
    }
  },500);
}

function nextQuestion(){
  clearInterval(timerInterval);
  db.ref('rooms/'+room).once('value',snap=>{
    const d=snap.val();
    if(!d) return;

    db.ref('quizzes/'+d.quizId).once('value',qSnap=>{
      const quiz=qSnap.val();
      if(!quiz) return;

      currentIndex=d.qIndex+1;

      if(currentIndex>=quiz.questions.length){
        db.ref('rooms/'+room).update({phase:'end'});
        return;
      }

      startAt=Date.now()+3000;
      db.ref('rooms/'+room).update({qIndex:currentIndex,startAt:startAt});
      runTimer();
    });
  });
}

// SHOW
function showQuestion(data){
  db.ref('quizzes/'+data.quizId).once('value',snap=>{
    const quiz=snap.val();
    if(!quiz) return;

    const q=quiz.questions[data.qIndex];
    if(!q) return;

    document.getElementById('game').classList.remove('hidden');
    document.getElementById('lobby').classList.add('hidden');

    document.getElementById('q').innerText=q.q;
    document.getElementById('a').innerText=q.a;
    document.getElementById('b').innerText=q.b;
    document.getElementById('c').innerText=q.c;
  });
}

// ANSWER
function answer(v){
  db.ref('rooms/'+room+'/players/'+nick).once('value',snap=>{
    let s=snap.val().score||0;
    db.ref('rooms/'+room+'/players/'+nick).update({score:s+1});
  });
}

// SAVE QUIZ
function saveQuiz(){
  const title=document.getElementById('quizTitle').value;
  const data=JSON.parse(document.getElementById('quizData').value);
  const id='quiz_'+Date.now();

  db.ref('quizzes/'+id).set({title:title,questions:data});
  alert('Zapisano quiz');
}
</script>
</body>
</html>
